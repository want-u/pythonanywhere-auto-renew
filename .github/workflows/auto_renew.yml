
name: PythonAnywhere Auto Renew

on:
  schedule:
    # 每两个月的第1天执行（1月、3月、5月、7月、9月、11月）
    - cron: '11 10 * * 1'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read
  issues: write

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Run auto renew script
      id: renew
      env:
        PYTHONANYWHERE_USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
        PYTHONANYWHERE_PASSWORD: ${{ secrets.PYTHONANYWHERE_PASSWORD }}
      run: |
        python pythonanywhere_auto_renew.py
    - name: Send notification email
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const result = '${{ steps.renew.outcome }}';
          const commitUrl = '${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}';
          let subject, body;
          if (result === 'success') {
            subject = '✅ PythonAnywhere 续期成功';
            body = '🎉 您的PythonAnywhere网站已成功续期！\n\n' +
                   '📅 执行时间: ' + new Date().toLocaleString('zh-CN') + '\n' +
                   '🔗 提交详情: ' + commitUrl + '\n' +
                   '📊 工作流运行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n' +
                   '网站将继续运行1个月。如有问题请查看GitHub Actions日志。';
          } else {
            subject = '❌ PythonAnywhere 续期失败';
            body = '⚠️ PythonAnywhere网站续期失败，需要手动处理！\n\n' +
                   '📅 执行时间: ' + new Date().toLocaleString('zh-CN') + '\n' +
                   '🔗 提交详情: ' + commitUrl + '\n' +
                   '📊 工作流运行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n' +
                   '请检查GitHub Actions日志了解详细错误信息，并手动续期您的网站。';
          }
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: subject,
            body: body,
            labels: ['automated-notification']
          });
    - name: Upload screenshots on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-screenshots
        path: |
          *.png
          *.html
